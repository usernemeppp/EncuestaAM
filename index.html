<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encuesta</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Inter, sans-serif;
    }

    body{
      background:#fafafa;
      color:#111;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:40px 20px;
    }

    .title-box{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:25px;
    }

.logo{
  width:250px;
  height:250px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 4px 15px rgba(0,0,0,0.12);
}


    .container{
      width:100%;
      max-width:700px;
    }

    .badge{
      display:inline-block;
      background:#ffe7f4;
      color:#ff1493;
      padding:8px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
      margin-bottom:25px;
    }

    h1{
      font-size:56px;
      line-height:1.1;
      margin-bottom:20px;
      font-weight:800;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      border:1px solid #eee;
    }

    .question{
      margin-bottom:28px;
    }

    .question label{
      display:block;
      font-size:16px;
      font-weight:600;
      margin-bottom:12px;
    }

    input,
    textarea{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #ddd;
      background:#fafafa;
      font-size:15px;
      transition:0.2s;
    }

    input:focus,
    textarea:focus{
      outline:none;
      border-color:#ff1493;
      background:white;
    }

    textarea{
      resize:none;
      min-height:120px;
    }

    .options{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .option{
      flex:1;
      min-width:120px;
    }

    .option input{
      display:none;
    }

    .option label{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:58px;
      padding:14px;
      border-radius:14px;
      border:1px solid #ddd;
      background:#fafafa;
      cursor:pointer;
      transition:0.2s;
    }

    .option input:checked + label{
      background:#374cb6;
      color:white;
      border-color:#000;
    }

    button{
      width:100%;
      border:none;
      padding:18px;
      border-radius:16px;
      background:#111;
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.25s;
    }

    button:hover{
      transform:translateY(-2px);
      background:#ff1493;
    }

    @media(max-width:700px){

      h1{
        font-size:38px;
      }

      .card{
        padding:25px;
      }

      .options{
        flex-direction:column;
      }
    }
  </style>

</head>
<body>

  <div class="container">

    <div class="badge">
      ✨ Encuesta rápida
    </div>
<img 
    src="amora.jpeg" 

    class="logo"
  >
    <h1>
      Tu opinión es importante para nosotros
    </h1>

    <div class="title-box">

  


</div>

    <div class="card">
<form action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="f130b824-dca3-4755-bdc3-37f4741ad60e">

        <input type="hidden" name="from_name" value="Encuesta Manicurista">

        <input type="hidden" name="subject" value="Nueva encuesta recibida">

        <input type="hidden" name="redirect" value="https://google.com">

        <div class="question">
          <label>¿Cómo te llamas?</label>
          <input type="text" name="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="question">
          <label>¿Quién te atendió en tu última visita?</label>

          <div class="options">

            <div class="option">
              <input type="radio" name="trabajadora" id="fernanda" value="Fernanda">
              <label for="fernanda">Fernanda</label>
            </div>

            <div class="option">
              <input type="radio" name="trabajadora" id="iliana" value="Iliana">
              <label for="iliana">Iliana</label>
            </div>

            <div class="option">
              <input type="radio" name="trabajadora" id="ghenna" value="Ghenna">
              <label for="ghenna">Ghenna</label>
            </div>

            <div class="option">
              <input type="radio" name="trabajadora" id="jessica" value="Jessica">
              <label for="jessica">Jessica</label>
            </div>

            <div class="option">
              <input type="radio" name="trabajadora" id="magda" value="Magda">
              <label for="magda">Magda</label>
            </div>

            <div class="option">
              <input type="radio" name="trabajadora" id="fanny" value="Fanny">
              <label for="fanny">Fanny</label>
            </div>

          </div>
        </div>

        <div class="question">
          <label>¿Tu servicio inició a tiempo?</label>

          <div class="options">

            <div class="option">
              <input type="radio" name="tiempo" id="si-tiempo" value="Sí">
              <label for="si-tiempo">Sí</label>
            </div>

            <div class="option">
              <input type="radio" name="tiempo" id="llegue-tarde" value="Llegó tarde">
              <label for="llegue-tarde">No, llegué tarde</label>
            </div>

            <div class="option">
              <input type="radio" name="tiempo" id="no-lista" value="Manicurista no lista">
              <label for="no-lista">No, mi manicurista no estaba lista</label>
            </div>

          </div>
        </div>

        <div class="question">
          <label>¿Cómo calificas el servicio de tu manicurista?</label>

          <div class="options">

            <div class="option">
              <input type="radio" name="calificacion" id="excelente" value="Excelente">
              <label for="excelente">Excelente</label>
            </div>

            <div class="option">
              <input type="radio" name="calificacion" id="bueno" value="Bueno">
              <label for="bueno">Bueno</label>
            </div>

            <div class="option">
              <input type="radio" name="calificacion" id="regular" value="Puede mejorar">
              <label for="regular">Puede mejorar</label>
            </div>

            <div class="option">
              <input type="radio" name="calificacion" id="malo" value="Malo">
              <label for="malo">Malo</label>
            </div>

          </div>
        </div>

        <div class="question">
  <label>¿Cumplimos tus expectativas?</label>

  <div class="options">

    <div class="option">
      <input type="radio" name="expectativas" id="encanto" value="Sí, me encantó">
      <label for="encanto">Sí, me encantó</label>
    </div>

    <div class="option">
      <input type="radio" name="expectativas" id="regular2" value="Regular">
      <label for="regular2">Regular</label>
    </div>

    <div class="option">
      <input type="radio" name="expectativas" id="nogusto" value="No le gustó">
      <label for="nogusto">No, no me gustó</label>
    </div>

  </div>
</div>

<div class="question">
  <label>¿Te sentiste bien atendida durante tu visita?</label>

  <div class="options">

    <div class="option">
      <input type="radio" name="atencion" id="atencion-si" value="Sí">
      <label for="atencion-si">Sí</label>
    </div>

    <div class="option">
      <input type="radio" name="atencion" id="atencion-no" value="No">
      <label for="atencion-no">No</label>
    </div>

  </div>
</div>

<div class="question">
  <label>¿Te ofrecieron alguna bebida?</label>

  <div class="options">

    <div class="option">
      <input type="radio" name="bebida" id="bebida-si" value="Sí">
      <label for="bebida-si">Sí</label>
    </div>

    <div class="option">
      <input type="radio" name="bebida" id="bebida-no" value="No">
      <label for="bebida-no">No</label>
    </div>

  </div>
</div>

<div class="question">
  <label>¿Cómo te enteraste de nosotros?</label>

  <div class="options">

    <div class="option">
      <input type="radio" name="origen" id="instagram" value="Instagram">
      <label for="instagram">Instagram</label>
    </div>

    <div class="option">
      <input type="radio" name="origen" id="tiktok" value="TikTok">
      <label for="tiktok">TikTok</label>
    </div>

    <div class="option">
      <input type="radio" name="origen" id="recomendacion" value="Recomendación">
      <label for="recomendacion">Recomendación</label>
    </div>

  </div>
</div>

        <div class="question">
          <label>¿Qué te pareció el servicio de recepción?</label>
          <textarea name="recepcion" placeholder="Escribe aquí..."></textarea>
        </div>

        <button type="submit">
          Enviar respuestas 
        </button>

      </form>

    </div>

  </div>

</body>
</html>
